name: Sync Docs to Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Sync docs to wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wikiリポジトリをclone（actions/checkoutではなくgit cloneで直接取得）
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki || {
            echo "Wiki repository does not exist yet. Please create at least one wiki page manually."
            exit 0
          }

          # docs/ の中身をwikiにコピー
          # ja/ と en/ をフラットにせず、そのままの構造でコピー
          rsync -av --delete --exclude='.git' docs/ wiki/

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 変更がある場合のみコミット・プッシュ
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "📝 docs/ からWikiを自動同期"
            git push
            echo "✅ Wiki synced successfully."
          else
            echo "ℹ️ No changes to sync."
          fi
