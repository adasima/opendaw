name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          target: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release

      - name: Create portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging -Force
          Copy-Item target/release/aura_daw.exe staging/
          Copy-Item README.md staging/
          Copy-Item LICENSE staging/ -ErrorAction SilentlyContinue
          Compress-Archive -Path staging/* -DestinationPath opendaw-portable-windows.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: opendaw-portable-windows.zip
          generate_release_notes: true
