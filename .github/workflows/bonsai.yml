name: Jules Auto-Bonsai

on:
  pull_request:
    types: [opened]

jobs:
  auto-merge:
    # 作成者が「adasima」か「jules[bot]」であり、かつJulesの署名がある場合のみ起動（偽装防止）
    if: (github.actor == 'adasima' || github.actor == 'google-labs-jules[bot]') && contains(github.event.pull_request.body, 'PR created automatically by Jules')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable Auto-merge for Jules
        # --auto はCIステータスチェック(ci.yml)が通るまでマージを待機する
        # CIが失敗した場合、マージされない（安全弁）
        run: |
          for i in {1..5}; do
            gh pr merge "${{ github.event.pull_request.html_url }}" --squash --auto --delete-branch && break || sleep 10
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
